---
- name: Установить пакеты для PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == "Debian"

- name: Настроить pg_hba.conf для локального доверия (для лабы)
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf # ← ПОДСТАВЬ СВОЮ ВЕРСИЮ!
    regexp: '^local\s+all\s+postgres\s+peer'
    line: "local   all             postgres                                trust"
    state: present
    backup: yes
  become: yes
  notify: Restart PostgreSQL

- name: Убедиться, что PostgreSQL запущен
  service:
    name: postgresql
    state: started
    enabled: yes
  become: yes

- name: Создать пользователя для приложения
  shell: |
    psql -U postgres -c "CREATE ROLE appuser WITH LOGIN PASSWORD '{{ appuser_password }}' CREATEDB;"
  become: yes # ← Только root, БЕЗ become_user!
  changed_when: false
  failed_when: false # Не ошибка, если пользователь уже есть

- name: Создать базу данных для приложения
  shell: |
    psql -U postgres -c "CREATE DATABASE appdb OWNER appuser;"
  become: yes # ← Только root, БЕЗ become_user!
  changed_when: false
  failed_when: false # Не ошибка, если БД уже есть
