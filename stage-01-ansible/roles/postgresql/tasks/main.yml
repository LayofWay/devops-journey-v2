---
- name: Установить пакеты для PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes
  become: yes
  when: ansible_os_family == "Debian"

- name: Убедиться, что PostgreSQL запущен
  service:
    name: postgresql
    state: started
    enabled: yes
  become: yes

- name: Создать пользователя для приложения
  postgresql_user:
    name: appuser
    password: "SecurePass123!"
    role_attr_flags: CREATEDB
  become: yes
  become_user: postgres

- name: Создать базу данных для приложения
  postgresql_db:
    name: appdb
    owner: appuser
  become: yes
  become_user: postgres
